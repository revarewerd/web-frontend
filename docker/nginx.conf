server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — все маршруты ведут на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API проксирование на Device Manager
    location /api/ {
        proxy_pass http://device-manager:8082/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket проксирование (websocket-service опционален)
    location /ws/ {
        # Используем переменную, чтобы nginx не падал если upstream недоступен
        set $ws_upstream http://websocket-service:8084;
        proxy_pass $ws_upstream/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;

        # Резолвер для динамического DNS (Docker DNS)
        resolver 127.0.0.11 valid=30s ipv6=off;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
