server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — все маршруты ведут на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── API проксирование (без API Gateway, напрямую к сервисам) ───────────

    # Device Manager — устройства, ТС, IMEI
    location /api/devices {
        set $dm_upstream http://tracker-dm:10092;
        proxy_pass $dm_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        resolver 127.0.0.11 valid=30s ipv6=off;
    }

    # History Writer — история GPS, latest positions
    location /api/history {
        set $hw_upstream http://tracker-hw:10091;
        proxy_pass $hw_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        resolver 127.0.0.11 valid=30s ipv6=off;
    }

    # Fallback /api/ → 502 (API Gateway не развёрнут, отдаём понятный ответ)
    location /api/ {
        return 502 '{"error": "API Gateway not deployed. Use /api/devices or /api/history directly."}';
        add_header Content-Type application/json;
    }

    # WebSocket проксирование → websocket-service :8090
    # WS идёт напрямую к WS Service (минуя API Gateway, т.к. long-lived connection)
    # Клиент подключается: ws://host/ws?orgId=123&token=<jwt>
    # Матчим и /ws и /ws/ (клиент отправляет /ws?params, без trailing slash)
    location ~ ^/ws(/|$) {
        # Используем переменную, чтобы nginx не падал если upstream недоступен
        set $ws_upstream http://tracker-ws:8090;
        proxy_pass $ws_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;

        # Резолвер для динамического DNS (Docker DNS)
        resolver 127.0.0.11 valid=30s ipv6=off;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
